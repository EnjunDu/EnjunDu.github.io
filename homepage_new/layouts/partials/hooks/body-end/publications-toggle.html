<script>
(function () {
  var moreSection = document.getElementById('more-publications');
  var papersSection = document.getElementById('papers');
  if (!moreSection || !papersSection) return;

  // ── Kill the spacing/padding on the more-publications section ──
  moreSection.style.paddingTop = '0';
  moreSection.style.marginTop = '-4rem';
  var moreSectionParent = moreSection.parentElement;
  if (moreSectionParent && moreSectionParent.tagName === 'SECTION') {
    moreSectionParent.style.paddingTop = '0';
    moreSectionParent.style.marginTop = '0';
  }

  // ── Initial hidden state ──
  moreSection.style.overflow = 'hidden';
  moreSection.style.height = '0';
  moreSection.style.opacity = '0';

  // ── Google Scholar line ──
  var scholarDiv = document.createElement('div');
  scholarDiv.className = 'hb-scholar-note';
  scholarDiv.innerHTML =
    'Full publication list can be found on ' +
    '<a href="https://scholar.google.com/citations?user=PvBvdgQAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>.';

  // ── Show More button ──
  var btn = document.createElement('div');
  btn.id = 'pub-show-more-wrap';
  btn.style.cssText = 'text-align:center; padding:1.5rem 0 1rem 0;';
  btn.innerHTML =
    '<button id="pub-show-more-btn" class="hb-toggle-btn">' +
    '  <span id="pub-show-more-label">Show More</span>' +
    '  <svg id="pub-show-more-icon" class="hb-toggle-btn-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" ' +
    '       fill="none" viewBox="0 0 24 24" stroke="currentColor">' +
    '    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>' +
    '  </svg>' +
    '</button>';

  // ── Anchor marking the "collapsed" resting place, right after the ──
  // ── last featured paper and before the (hidden) #more-publications. ──
  var anchor = document.createComment('pub-toggle-anchor');
  var allPapers = papersSection.querySelectorAll('.pub-list-item, .hb-pub-card');
  if (allPapers.length > 0) {
    var lastPaper = allPapers[allPapers.length - 1];
    lastPaper.parentNode.insertBefore(anchor, lastPaper.nextSibling);
  } else {
    papersSection.appendChild(anchor);
  }
  anchor.parentNode.insertBefore(scholarDiv, anchor.nextSibling);
  scholarDiv.parentNode.insertBefore(btn, scholarDiv.nextSibling);

  // ── Smooth height animation utility ──
  function animateHeight(el, from, to, duration, onDone) {
    var start = performance.now();
    el.style.height = from + 'px';
    el.style.overflow = 'hidden';

    function step(now) {
      var t = Math.min((now - start) / duration, 1);
      // easeInOutCubic for silky feel
      var ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      var current = from + (to - from) * ease;
      el.style.height = current + 'px';
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        if (onDone) onDone();
      }
    }
    requestAnimationFrame(step);
  }

  // ── Toggle logic ──
  var expanded = false;
  var animating = false;

  document.getElementById('pub-show-more-btn').addEventListener('click', function () {
    if (animating) return;
    animating = true;

    var label = document.getElementById('pub-show-more-label');
    var icon  = document.getElementById('pub-show-more-icon');

    if (expanded) {
      // Move the note + button back to their resting place right under the
      // featured papers, *before* collapsing the extra content.
      anchor.parentNode.insertBefore(scholarDiv, anchor.nextSibling);
      scholarDiv.parentNode.insertBefore(btn, scholarDiv.nextSibling);

      // Collapse
      var currentH = moreSection.scrollHeight;
      var dur = Math.min(Math.max(currentH / 3, 400), 800);
      moreSection.style.opacity = '0';
      animateHeight(moreSection, currentH, 0, dur, function() {
        moreSection.style.height = '0';
        animating = false;
      });
      label.textContent = 'Show More';
      icon.style.transform = '';
      expanded = false;
      setTimeout(function() {
        btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, dur * 0.7);
    } else {
      // Relocate the note + button to the bottom of #more-publications,
      // so "Show Less" always ends up right after the newly revealed
      // papers instead of staying stranded above them.
      moreSection.appendChild(scholarDiv);
      moreSection.appendChild(btn);

      // Expand
      moreSection.style.height = 'auto';
      var fullHeight = moreSection.scrollHeight;
      moreSection.style.height = '0';
      var dur = Math.min(Math.max(fullHeight / 3, 400), 800);
      moreSection.style.opacity = '1';
      animateHeight(moreSection, 0, fullHeight, dur, function() {
        moreSection.style.height = 'auto';
        moreSection.style.overflow = 'visible';
        animating = false;
      });
      label.textContent = 'Show Less';
      icon.style.transform = 'rotate(180deg)';
      expanded = true;
    }
  });
})();
</script>

<style>
  /* Remove theme spacing between papers and more-publications sections */
  #more-publications {
    padding-top: 0 !important;
    margin-top: -3rem !important;
  }
  section:has(#more-publications) {
    padding-top: 0 !important;
    margin-top: -3rem !important;
  }

  /* ── Talks section: constrain image size ── */
  #talks article img,
  #talks .article-grid img,
  section:has(#talks) article img {
    max-height: 220px !important;
    width: auto !important;
    object-fit: cover !important;
    border-radius: 8px;
  }
  #talks .grid > div,
  section:has(#talks) .grid > div {
    max-width: 500px;
  }
</style>
