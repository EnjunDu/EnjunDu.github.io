# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  # Dark by default so the purple-gold scheme shows cohesively.
  # (The navbar theme toggle still lets visitors switch to light.)
  mode: dark
  # Base theme color; the accent is overridden to gold in
  # assets/css/custom.css (purple-gold theme), so this value is
  # only a fallback and kept as a valid built-in theme name.
  color: emerald

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'The highly-customizable Hugo Academic theme powered by Hugo Blox Builder. Easily create your personal academic website.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "Enjun Du（杜恩俊）"

# Site footer
footer:
  copyright:
    notice: "© {year} Enjun Du’s homepage. Enjun Du reserves all rights of interpretation."
    license:
      enable: false
      allow_derivatives: false
      share_alike: false
      allow_commercial: false


# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
