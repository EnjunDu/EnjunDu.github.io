# ============================================================
# News Data File / 新闻数据文件
# ============================================================
# 每条新闻只需要两个字段 (Each item only needs two fields):
#
#   - date: "[Mon. Year]"
#     content: "你的新闻内容 (your news sentence)"
#
# 语法说明 / Syntax (可在 content 里的任意位置、任意次数使用):
#
#   **文字**            -> 粉色加粗高亮，不带链接 (pink bold highlight, no link)
#   [文字](链接地址)     -> 粉色加粗下划线超链接 (pink bold underlined hyperlink)
#
# 其余普通文字会按固定的深色文字渲染，不会再出现"变成白色"的问题。
# Plain text (outside of ** ** or [ ]( )) always renders in the same dark
# color, so it will never accidentally turn white again.
#
# 例子 / Example:
#   - date: "[Jun. 2026]"
#     content: "I was selected for **Tencent Project UP**, Tencent's [Qingyun Talent Program](https://join.qq.com/qingyun.html), and will join Tencent Lightspeed as an intern."
#
# 注意 / Notes:
#   - 越新的新闻放在列表最上面 (Newest items should be at the TOP)
#   - 不再需要 highlight / extra / link_text / link_url 这些字段，也不需要写 HTML
# ============================================================

